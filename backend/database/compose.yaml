name: QualiSenior-Docker
services:

  db:
    image: postgres:18
    container_name: qualisenior-db
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql

  adminer:
    image: adminer
    container_name: qualisenior-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_MAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  portainer:
    image: portainer/portainer-ce:sts
    container_name: portainer-qualisenior
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    depends_on:
      - db

volumes:
  db_data:
  pgadmin_data:
  portainer_data: